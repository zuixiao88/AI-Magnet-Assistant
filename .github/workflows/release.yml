name: Release (Draft / Pre-release)

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release (e.g., v1.2.0-rc.0)'
        required: true
        default: 'v1.2.0-rc.0'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref || inputs.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Build Windows only; Linux/macOS packages are intentionally omitted.
        os: [windows-2022]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
          shared-key: ai-magnet-assistant-${{ runner.os }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Windows packaging dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y nsis || Write-Host "nsis install failed, continuing"
          choco install -y wixtoolset || Write-Host "wixtoolset install failed, continuing"

      - name: Add WiX/NSIS to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wixDir = Get-ChildItem "C:\\Program Files (x86)" -Filter "WiX Toolset v*" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if ($wixDir) { "$($wixDir.FullName)\\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8 }
          $nsisBin = "C:\\Program Files (x86)\\NSIS\\Bin"
          if (Test-Path $nsisBin) { $nsisBin | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8 }

      - name: Install frontend dependencies
        run: npm ci

      - name: Bundle rqbit player engine
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          $release = Invoke-RestMethod -Headers @{ "User-Agent" = "AI-Magnet-Assistant-CI"; "Authorization" = "Bearer $env:GH_TOKEN" } -Uri "https://api.github.com/repos/ikatson/rqbit/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -eq "rqbit.exe" } | Select-Object -First 1
          if (-not $asset) {
            $asset = $release.assets |
              Where-Object { $_.name -match "(x86_64|amd64|x64).*(windows|pc-windows|msvc)|(windows|pc-windows|msvc).*(x86_64|amd64|x64)" } |
              Where-Object { $_.name -notmatch "(desktop|installer|setup|msi)" } |
              Select-Object -First 1
          }
          if (-not $asset) {
            throw "No rqbit Windows x64 release asset found"
          }
          $download = Join-Path $env:RUNNER_TEMP $asset.name
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $download
          $extractDir = Join-Path $env:RUNNER_TEMP "rqbit"
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          if ($asset.name.EndsWith(".zip")) {
            Expand-Archive -Path $download -DestinationPath $extractDir -Force
            $rqbit = Get-ChildItem -Path $extractDir -Recurse -Filter "rqbit.exe" | Select-Object -First 1
          } else {
            $rqbit = Get-Item $download
          }
          if (-not $rqbit) {
            throw "Downloaded rqbit asset did not contain rqbit.exe"
          }
          Copy-Item $rqbit.FullName src-tauri/binaries/rqbit-x86_64-pc-windows-msvc.exe -Force

      - name: Build Tauri app
        env:
          CI: true
          TAURI_SKIP_SIGNING: "1"
          RUST_BACKTRACE: "1"
        run: npm run tauri build

      - name: Normalize Windows artifact names
        if: runner.os == 'Windows'
        shell: bash
        run: |
          SKIP_BUILD=1 bash run/package-win.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-magnet-assistant-${{ matrix.os }}
          if-no-files-found: warn
          retention-days: 7
          path: src-tauri/target/release/bundle/portable/**/*.exe

  publish:
    name: Create GitHub Release (draft)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure coreutils
        run: |
          sudo apt-get update -y
          sudo apt-get install -y coreutils

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate SHA256 checksums
        run: |
          cd dist
          find . -type f -name "*.exe" -print0 | \
            xargs -0 -r sha256sum >> SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release (draft, prerelease)
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          generate_release_notes: true
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag_name }}
          body: |
            This is a draft/pre-release generated by CI for the Windows portable artifact.
            See docs/RELEASES.md for detailed change notes.
          files: |
            dist/**/*.exe
            dist/**/SHA256SUMS.txt
